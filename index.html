        /* Estilo Minimalista e Interface Suave */
        :root {
            --bg-color: #fcfcfc;

            --card-bg: #ffffff;
            --button-pink: #ff8fa3;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);

            flex-direction: column;
            align-items: center;
